project_id = "hijzebtakmkyrowdqtrd"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "https://veganglow.vercel.app/**"
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.google]
enabled = false
client_id = ""
secret = ""
redirect_uri = ""

# Custom access token hook injects staff_role + permissions + role_weight + is_super_admin
# into JWT app_metadata so middleware can authorize without DB roundtrip.
# See migration 00025_jwt_custom_claims_hook.sql
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[storage]
enabled = true
file_size_limit = "5MB"

[realtime]
enabled = true

[functions.bank-transfer-webhook]
verify_jwt = false
