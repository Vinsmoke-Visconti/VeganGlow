# ============================================
# VeganGlow — Docker Compose (Development)
# Runs web app + Supabase local stack
# ============================================

version: '3.9'

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
      - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - ../apps/web/src:/app/src
      - ../apps/web/public:/app/public
    depends_on:
      - supabase-studio
    restart: unless-stopped

  # Note: For full Supabase local stack, use `supabase start`
  # This compose file is for the web container only in dev
  supabase-studio:
    image: supabase/studio:latest
    ports:
      - "54323:3000"
    environment:
      - SUPABASE_URL=http://supabase-kong:8000
      - STUDIO_PG_META_URL=http://supabase-meta:8080
    restart: unless-stopped

volumes:
  supabase-data:
