# ============================================
# VeganGlow — Docker Compose (Production)
# Optimized for cloud deployment
# ============================================

version: '3.9'

services:
  web:
    image: terrykozte/veganglow:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
